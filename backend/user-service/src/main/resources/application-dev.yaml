app:
  seed:
    enabled: true
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}
spring:
  application:
    name: user-service
  config:
    import: "optional:file:.env.local[.properties]"
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 60s
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  threads:
    virtual:
      enabled: true
grpc:
  client:
    food-service:
      address: ${FOOD_SERVICE_GRPC_ADDRESS}
      negotiation-type: plaintext
  server:
    port: ${GRPC_PORT}
    reflection-enabled: true
server:
  port: ${APP_PORT}
jwt:
  key-alias: ${JWT_KEY_ALIAS}
  keystore-password: ${JWT_KEYSTORE_PASSWORD}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS}
debug: true

