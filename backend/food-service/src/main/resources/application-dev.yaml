spring:
  application:
    name: food-service
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME}
      password: ${SPRING_SECURITY_USER_PASSWORD}
  config:
    import: "optional:file:.env.local[.properties]"
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    flyway:
      enabled: true
    threads:
      virtual:
        enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 60s
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
grpc:
  client:
    user-service:
      address: ${USER_SERVICE_GRPC_ADDRESS}
      negotiation-type: plaintext
  server:
    port: ${GRPC_PORT}
    reflection-enabled: true
app:
  seed:
    enabled: true
    images:
      scrape-enabled: true
      upload-to-minio: true
      image-source-template: "https://source.unsplash.com/featured/?{query}"
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}
server:
  port: ${APP_PORT}

