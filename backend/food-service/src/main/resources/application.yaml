spring:
  application:
    name: food-service
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    flyway:
      enabled: false
    threads:
      virtual:
        enabled: true

server:
  port: ${APP_PORT}
