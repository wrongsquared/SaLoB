resources:
  - ./api-gateway/deployment.yaml
  - ./api-gateway/service.yaml
  - ./food-service/deployment.yaml
  - ./food-service/service.yaml
  - ./user-service/deployment.yaml
  - ./user-service/service.yaml

# This automatically reads the local .env files and creates K8s Secrets
secretGenerator:
  - name: api-gateway-secrets
    envs:
      - ./api-gateway/.env
  - name: food-service-secrets
    envs:
      - ./food-service/.env
  - name: user-service-secrets
    envs:
      - ./user-service/.env

# Forces a common label on everything for easy cleanup
metadata:
  labels:
    app.kubernetes.io/part-of: salob
